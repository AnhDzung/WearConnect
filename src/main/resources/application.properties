spring.application.name=wearconnect

server.port=8080
server.servlet.context-path=
server.servlet.session.cookie.http-only=true

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=WearConnect;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=sa
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB

logging.level.org.springframework.web=INFO
logging.level.com.wearconnect=INFO

app.notifications.overdue.cron=0 */15 * * * *

# n8n chatbot integration
n8n.webhook-url=${N8N_WEBHOOK_URL:http://localhost:5678/webhook/wearconnect-chat}
n8n.timeout-ms=${N8N_TIMEOUT_MS:5000}

# Internal API token for n8n -> Spring Boot calls
internal.api.token=${INTERNAL_API_TOKEN:change-me-in-production}