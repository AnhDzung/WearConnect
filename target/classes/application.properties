spring.application.name=wearconnect

server.port=8080
server.servlet.context-path=
server.servlet.session.cookie.http-only=true

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=WearConnect;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=sa
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB

logging.level.org.springframework.web=INFO
logging.level.com.wearconnect=INFO

app.notifications.overdue.cron=0 */15 * * * *

# AI auto verification for PAYMENT_SUBMITTED orders
app.payment.ai-verification.enabled=true
app.payment.ai-verification.timeout-hours=24
app.payment.ai-verification.max-per-run=20
app.payment.ai-verification.cron=0 */10 * * * *

# Gemini chatbot integration via Spring AI
spring.ai.model.chat=google-genai
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.options.model=${GEMINI_MODEL:gemini-2.5-flash}
spring.ai.google.genai.chat.options.temperature=${GEMINI_TEMPERATURE:0.5}
spring.ai.google.genai.chat.options.max-output-tokens=${GEMINI_MAX_OUTPUT_TOKENS:512}

app.chatbot.system-prompt=Ban la tro ly AI cua WearConnect. Tra loi bang tieng Viet, ngan gon, lich su, va chi tap trung vao chu de thue trang phuc, don hang, tien coc, san pham, kich co, va chinh sach cua WearConnect. Neu thong tin chua du, hay hoi them mot cau ngan de lam ro nhu cau.

# Internal API token for n8n -> Spring Boot calls
internal.api.token=${INTERNAL_API_TOKEN:change-me-in-production}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/oauth2/callback/google}

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://www.googleapis.com/oauth2/v4/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub